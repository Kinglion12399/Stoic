<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Стоики">
<meta name="theme-color" content="#090806">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Стоики — Наставники</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090806;
  --gold:#c8a84b;--gold-light:#e8c96a;--gold-dim:#6a5528;
  --silver:#9aabb8;--silver-light:#c4d4e0;--silver-dim:#4a5a66;
  --marcus:#a0785a;--marcus-light:#c8a080;--marcus-dim:#5a3e28;
  --agora:#7a9a6a;--agora-light:#a0c090;--agora-dim:#3a5a2a;
  --diary:#8a7a9a;--diary-light:#b0a0c8;--diary-dim:#4a3a5a;
  --text:#e4d8be;--text-dim:#7a6e58;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;display:flex;flex-direction:column;height:100dvh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,168,75,.05) 0%,transparent 60%),radial-gradient(ellipse 50% 35% at 80% 70%,rgba(100,143,168,.04) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 50% 20%,rgba(160,120,90,.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* KEY */
#keyScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:18px;}
#keyScreen.hidden{display:none;}
.key-title{font-family:'Cinzel',serif;font-size:24px;letter-spacing:5px;color:var(--gold);text-shadow:0 0 24px rgba(200,168,75,.4);text-align:center;}
.key-sub{font-style:italic;font-size:13px;color:var(--text-dim);text-align:center;line-height:1.7;max-width:300px;}
.key-divider{width:80px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
.key-input{width:100%;max-width:340px;background:rgba(22,18,10,.88);border:1px solid rgba(200,168,75,.25);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:13px;padding:12px 14px;outline:none;text-align:center;-webkit-appearance:none;}
.key-input:focus{border-color:rgba(200,168,75,.5);}
.key-input::placeholder{color:rgba(120,110,80,.4);font-style:italic;font-size:12px;}
.key-btn{width:100%;max-width:340px;background:linear-gradient(135deg,rgba(200,168,75,.15),rgba(200,168,75,.08));border:1px solid rgba(200,168,75,.35);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;padding:14px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;}
.key-note{font-size:11px;color:var(--text-dim);text-align:center;opacity:.6;line-height:1.6;max-width:300px;}

/* HOME */
#homeScreen{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#homeScreen.hidden{display:none;}
.home-inner{display:flex;flex-direction:column;align-items:center;padding:calc(36px + var(--safe-top)) 24px calc(28px + var(--safe-bottom));}
.home-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;text-align:center;}
.home-main{font-family:'Cinzel',serif;font-size:28px;letter-spacing:6px;color:var(--gold);text-shadow:0 0 30px rgba(200,168,75,.35);margin-bottom:4px;text-align:center;}
.home-sub{font-style:italic;font-size:13px;color:var(--text-dim);margin-bottom:22px;text-align:center;}
.home-divider{width:100px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin-bottom:22px;}

/* QUOTE */
.quote-block{width:100%;max-width:380px;margin-bottom:22px;padding:18px 20px;border:1px solid rgba(200,168,75,.15);background:rgba(20,16,8,.7);position:relative;}
.quote-ornament{position:absolute;top:4px;right:12px;font-size:36px;opacity:.07;font-family:Georgia,serif;line-height:1;color:var(--gold);}
.quote-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;}
.quote-text{font-style:italic;font-size:15px;line-height:1.85;color:var(--text);margin-bottom:12px;}
.quote-footer{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.quote-gem{width:6px;height:6px;border-radius:50%;}
.quote-gem.seneca{background:var(--gold);box-shadow:0 0 6px rgba(200,168,75,.6);}
.quote-gem.epictetus{background:var(--silver);box-shadow:0 0 6px rgba(154,171,184,.5);}
.quote-gem.marcus{background:var(--marcus);box-shadow:0 0 6px rgba(160,120,90,.5);}
.quote-author{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.quote-author.seneca{color:var(--gold-dim);}
.quote-author.epictetus{color:var(--silver-dim);}
.quote-author.marcus{color:var(--marcus-dim);}
.quote-label-top{font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;width:100%;max-width:380px;text-align:left;}
.quote-block{margin-bottom:10px;}

/* CARDS */
.phil-cards{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px;}
.phil-card{display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;border:1px solid;transition:all .25s;-webkit-appearance:none;background:transparent;width:100%;text-align:left;}
.phil-card.sen{border-color:rgba(200,168,75,.2);}.phil-card.sen:active{background:rgba(200,168,75,.08);border-color:var(--gold);}
.phil-card.epi{border-color:rgba(154,171,184,.2);}.phil-card.epi:active{background:rgba(154,171,184,.06);border-color:var(--silver);}
.phil-card.mar{border-color:rgba(160,120,90,.2);}.phil-card.mar:active{background:rgba(160,120,90,.07);border-color:var(--marcus);}
.phil-card.all{border-color:rgba(122,154,106,.2);margin-top:6px;}.phil-card.all:active{background:rgba(122,154,106,.07);border-color:var(--agora);}
.phil-card.diary{border-color:rgba(138,122,154,.2);margin-top:6px;}.phil-card.diary:active{background:rgba(138,122,154,.07);border-color:var(--diary);}
.card-gem{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sen .card-gem{background:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.6);}
.epi .card-gem{background:var(--silver);box-shadow:0 0 10px rgba(154,171,184,.5);}
.mar .card-gem{background:var(--marcus);box-shadow:0 0 10px rgba(160,120,90,.5);}
.all .card-gem{background:var(--agora);box-shadow:0 0 10px rgba(122,154,106,.5);}
.diary .card-gem{background:var(--diary);box-shadow:0 0 10px rgba(138,122,154,.5);}
.card-info{flex:1;}
.card-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;margin-bottom:2px;}
.sen .card-name{color:var(--gold);}.epi .card-name{color:var(--silver);}.mar .card-name{color:var(--marcus);}.all .card-name{color:var(--agora);}.diary .card-name{color:var(--diary);}
.card-role{font-style:italic;font-size:11px;color:var(--text-dim);}
.card-arrow{font-family:'Cinzel',serif;font-size:14px;color:var(--text-dim);opacity:.4;}

/* CHAT */
#chatScreen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;}
#chatScreen.hidden{display:none;}
.chat-header{position:relative;z-index:10;display:flex;align-items:center;gap:12px;border-bottom:1px solid;background:rgba(9,8,6,.98);flex-shrink:0;padding:12px 16px;padding-top:calc(12px + var(--safe-top));}
.chat-header.sen{border-color:rgba(200,168,75,.2);}.chat-header.epi{border-color:rgba(154,171,184,.2);}.chat-header.mar{border-color:rgba(160,120,90,.2);}.chat-header.agh{border-color:rgba(122,154,106,.2);}
.back-btn{background:transparent;border:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;-webkit-appearance:none;}
.chat-gem{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chat-header.sen .chat-gem{background:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.7);}
.chat-header.epi .chat-gem{background:var(--silver);box-shadow:0 0 10px rgba(154,171,184,.6);}
.chat-header.mar .chat-gem{background:var(--marcus);box-shadow:0 0 10px rgba(160,120,90,.6);}
.chat-header.agh .chat-gem{background:var(--agora);box-shadow:0 0 10px rgba(122,154,106,.6);}
.chat-hdr-info{flex:1;}
.chat-hdr-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;}
.chat-header.sen .chat-hdr-name{color:var(--gold);}.chat-header.epi .chat-hdr-name{color:var(--silver);}.chat-header.mar .chat-hdr-name{color:var(--marcus);}.chat-header.agh .chat-hdr-name{color:var(--agora);}
.chat-hdr-role{font-style:italic;font-size:10px;color:var(--text-dim);}
.clear-btn{background:transparent;border:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;opacity:.45;padding:4px 6px;-webkit-appearance:none;}
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:10;-webkit-overflow-scrolling:touch;}
#msgs::-webkit-scrollbar{width:2px;}#msgs::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
.msg{max-width:88%;animation:slideIn .4s cubic-bezier(.22,.68,0,1.2) forwards;opacity:0;}
.msg.seneca,.msg.epictetus,.msg.marcus{align-self:flex-start;}.msg.user{align-self:flex-end;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.msg-label{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.msg.user .msg-label{flex-direction:row-reverse;color:var(--text-dim);}
.msg.seneca .msg-label{color:var(--gold-dim);}.msg.epictetus .msg-label{color:var(--silver-dim);}.msg.marcus .msg-label{color:var(--marcus-dim);}
.gem{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.msg.seneca .gem{background:var(--gold);box-shadow:0 0 7px rgba(200,168,75,.7);}
.msg.epictetus .gem{background:var(--silver);box-shadow:0 0 7px rgba(154,171,184,.6);}
.msg.marcus .gem{background:var(--marcus);box-shadow:0 0 7px rgba(160,120,90,.6);}
.msg.user .gem{background:var(--text-dim);}
.bubble{padding:12px 16px;font-size:clamp(13.5px,3.5vw,15.5px);line-height:1.8;}
.bubble p{margin-bottom:.5em;}.bubble p:last-child{margin-bottom:0;}.bubble em{font-style:italic;}
.msg.seneca .bubble{background:rgba(40,32,14,.92);border-left:2px solid var(--gold);border-top:1px solid rgba(200,168,75,.18);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.msg.seneca .bubble em{color:var(--gold-light);}
.msg.epictetus .bubble{background:rgba(14,24,34,.92);border-left:2px solid #6a8fa8;border-top:1px solid rgba(106,143,168,.18);color:#d8e8f0;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.msg.epictetus .bubble em{color:var(--silver-light);}
.msg.marcus .bubble{background:rgba(34,22,14,.92);border-left:2px solid var(--marcus);border-top:1px solid rgba(160,120,90,.18);color:#e8d8c4;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.msg.marcus .bubble em{color:var(--marcus-light);}
.msg.user .bubble{background:rgba(15,13,10,.75);border-right:2px solid rgba(100,90,65,.3);border-top:1px solid rgba(100,90,65,.12);color:var(--text-dim);font-style:italic;}
.save-quote-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:transparent;border:none;cursor:pointer;font-family:"Cinzel",serif;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 0;opacity:.3;transition:opacity .2s;-webkit-appearance:none;}
.save-quote-btn:active{opacity:1;}
.msg.seneca .save-quote-btn{color:var(--gold);}
.msg.epictetus .save-quote-btn{color:var(--silver);}
.msg.marcus .save-quote-btn{color:var(--marcus);}
.save-quote-btn.saved{opacity:.6;}
.badge{display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px 2px 6px;border:1px solid;}
.msg.seneca .badge{color:var(--gold);border-color:var(--gold-dim);background:rgba(200,168,75,.05);}
.msg.epictetus .badge{color:var(--silver);border-color:var(--silver-dim);background:rgba(154,171,184,.05);}
.msg.marcus .badge{color:var(--marcus);border-color:var(--marcus-dim);background:rgba(160,120,90,.05);}
.typing{display:none;align-self:flex-start;padding:9px 13px;border-left:2px solid;gap:5px;align-items:center;font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;}
.typing.sen-t{border-color:var(--gold-dim);background:rgba(40,32,14,.5);color:var(--gold-dim);}
.typing.epi-t{border-color:var(--silver-dim);background:rgba(14,24,34,.5);color:var(--silver-dim);}
.typing.mar-t{border-color:var(--marcus-dim);background:rgba(34,22,14,.5);color:var(--marcus-dim);}
.typing.show{display:flex;}
.td{width:5px;height:5px;border-radius:50%;animation:tp 1.2s ease-in-out infinite;}
.sen-t .td{background:var(--gold-dim);}.epi-t .td{background:var(--silver-dim);}.mar-t .td{background:var(--marcus-dim);}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes tp{0%,100%{opacity:.3;transform:scale(.75);}50%{opacity:1;transform:scale(1);}}
.chat-footer{position:relative;z-index:10;background:rgba(7,6,4,.97);border-top:1px solid rgba(200,168,75,.1);flex-shrink:0;padding-bottom:var(--safe-bottom);}
.input-row{display:flex;gap:8px;align-items:flex-end;padding:10px 12px;}
textarea{flex:1;background:rgba(22,18,10,.88);border:1px solid rgba(200,168,75,.18);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:15px;padding:9px 12px;resize:none;min-height:44px;max-height:110px;outline:none;transition:border-color .25s;line-height:1.5;border-radius:0;-webkit-appearance:none;}
textarea::placeholder{color:rgba(120,110,80,.4);font-style:italic;}
textarea:focus{border-color:rgba(200,168,75,.4);}
#sendBtn{background:transparent;border:1px solid rgba(200,168,75,.28);color:var(--gold);font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;padding:0 12px;cursor:pointer;text-transform:uppercase;height:44px;white-space:nowrap;-webkit-appearance:none;}
#sendBtn:active{background:rgba(200,168,75,.12);}#sendBtn:disabled{opacity:.35;}

/* DIARY SCREEN */
/* SCROLL SCREEN */
#scrollScreen{position:fixed;inset:0;background:var(--bg);z-index:55;display:flex;flex-direction:column;}
#scrollScreen.hidden{display:none;}
.scroll-header{display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(200,168,75,.15);background:rgba(9,8,6,.98);flex-shrink:0;padding:12px 16px;padding-top:calc(12px + var(--safe-top));}
.scroll-hdr-name{font-family:"Cinzel",serif;font-size:14px;letter-spacing:3px;color:var(--gold);flex:1;}
.scroll-gem-hdr{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.6);flex-shrink:0;}
.scroll-filters{display:flex;gap:6px;padding:10px 14px 6px;flex-shrink:0;overflow-x:auto;}
.scroll-filters::-webkit-scrollbar{display:none;}
#scrollList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(10px + var(--safe-bottom));}
#scrollList::-webkit-scrollbar{width:2px;}#scrollList::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
.scroll-card{margin-bottom:12px;padding:14px 16px;border:1px solid;animation:slideIn .3s ease forwards;opacity:0;}
.scroll-card.seneca{border-color:rgba(200,168,75,.2);background:rgba(30,24,10,.8);}
.scroll-card.epictetus{border-color:rgba(154,171,184,.2);background:rgba(10,18,26,.8);}
.scroll-card.marcus{border-color:rgba(160,120,90,.2);background:rgba(26,16,10,.8);}
.scroll-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.scroll-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.scroll-card.seneca .scroll-dot{background:var(--gold);}
.scroll-card.epictetus .scroll-dot{background:var(--silver);}
.scroll-card.marcus .scroll-dot{background:var(--marcus);}
.scroll-phil{font-family:"Cinzel",serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.scroll-card.seneca .scroll-phil{color:var(--gold-dim);}
.scroll-card.epictetus .scroll-phil{color:var(--silver-dim);}
.scroll-card.marcus .scroll-phil{color:var(--marcus-dim);}
.scroll-date{font-family:"Cinzel",serif;font-size:7px;color:var(--text-dim);margin-left:auto;opacity:.5;}
.scroll-text{font-style:italic;font-size:15px;line-height:1.75;color:var(--text);}
.scroll-del{background:transparent;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;opacity:.3;margin-left:6px;padding:0;-webkit-appearance:none;}
.scroll-del:active{opacity:.9;color:#a06060;}
.scroll-empty{text-align:center;padding:40px 20px;font-style:italic;color:var(--text-dim);font-size:14px;line-height:1.8;opacity:.6;}

#diaryScreen{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;}
#diaryScreen.hidden{display:none;}
.diary-header{display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(138,122,154,.2);background:rgba(9,8,6,.98);flex-shrink:0;padding:12px 16px;padding-top:calc(12px + var(--safe-top));}
.diary-hdr-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--diary);flex:1;}
.diary-gem-hdr{width:9px;height:9px;border-radius:50%;background:var(--diary);box-shadow:0 0 10px rgba(138,122,154,.6);flex-shrink:0;}

/* NEW ENTRY FORM */
.diary-form{padding:14px 14px 8px;border-bottom:1px solid rgba(138,122,154,.1);flex-shrink:0;}
.diary-form-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--diary-dim);margin-bottom:8px;}
.phil-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.phil-tag{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border:1px solid;cursor:pointer;background:transparent;-webkit-appearance:none;transition:all .2s;}
.phil-tag.sen{border-color:var(--gold-dim);color:var(--gold-dim);}
.phil-tag.sen.active{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.1);}
.phil-tag.epi{border-color:var(--silver-dim);color:var(--silver-dim);}
.phil-tag.epi.active{border-color:var(--silver);color:var(--silver);background:rgba(154,171,184,.08);}
.phil-tag.mar{border-color:var(--marcus-dim);color:var(--marcus-dim);}
.phil-tag.mar.active{border-color:var(--marcus);color:var(--marcus);background:rgba(160,120,90,.08);}
.phil-tag.own{border-color:var(--diary-dim);color:var(--diary-dim);}
.phil-tag.own.active{border-color:var(--diary);color:var(--diary);background:rgba(138,122,154,.08);}
.diary-ta{width:100%;background:rgba(18,14,8,.8);border:1px solid rgba(138,122,154,.18);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:15px;padding:10px 12px;resize:none;min-height:70px;max-height:130px;outline:none;line-height:1.7;border-radius:0;-webkit-appearance:none;margin-bottom:8px;}
.diary-ta::placeholder{color:rgba(120,110,80,.35);font-style:italic;}
.diary-ta:focus{border-color:rgba(138,122,154,.4);}
.diary-save-btn{width:100%;background:linear-gradient(135deg,rgba(138,122,154,.12),rgba(138,122,154,.06));border:1px solid rgba(138,122,154,.3);color:var(--diary);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:10px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;}
.diary-save-btn:active{background:rgba(138,122,154,.2);}

/* FILTER ROW */
.diary-filters{display:flex;gap:6px;padding:10px 14px 6px;flex-shrink:0;overflow-x:auto;}
.diary-filters::-webkit-scrollbar{display:none;}
.filter-btn{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border:1px solid rgba(138,122,154,.2);color:var(--text-dim);cursor:pointer;background:transparent;-webkit-appearance:none;white-space:nowrap;flex-shrink:0;}
.filter-btn.active{border-color:var(--diary);color:var(--diary);background:rgba(138,122,154,.08);}

/* ENTRIES LIST */
#entriesList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(10px + var(--safe-bottom));}
#entriesList::-webkit-scrollbar{width:2px;}#entriesList::-webkit-scrollbar-thumb{background:var(--diary-dim);border-radius:2px;}
.entry-card{margin-bottom:12px;padding:14px 16px;border:1px solid;animation:slideIn .3s ease forwards;opacity:0;}
.entry-card.seneca{border-color:rgba(200,168,75,.18);background:rgba(30,24,10,.7);}
.entry-card.epictetus{border-color:rgba(154,171,184,.18);background:rgba(10,18,26,.7);}
.entry-card.marcus{border-color:rgba(160,120,90,.18);background:rgba(26,16,10,.7);}
.entry-card.own{border-color:rgba(138,122,154,.18);background:rgba(18,14,24,.7);}
.entry-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.entry-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.entry-card.seneca .entry-dot{background:var(--gold);}
.entry-card.epictetus .entry-dot{background:var(--silver);}
.entry-card.marcus .entry-dot{background:var(--marcus);}
.entry-card.own .entry-dot{background:var(--diary);}
.entry-phil{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.entry-card.seneca .entry-phil{color:var(--gold-dim);}
.entry-card.epictetus .entry-phil{color:var(--silver-dim);}
.entry-card.marcus .entry-phil{color:var(--marcus-dim);}
.entry-card.own .entry-phil{color:var(--diary-dim);}
.entry-date{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;color:var(--text-dim);margin-left:auto;opacity:.6;}
.entry-text{font-size:15px;line-height:1.75;color:var(--text);}
.entry-del{background:transparent;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;opacity:.3;margin-left:6px;padding:0;-webkit-appearance:none;}
.entry-del:active{opacity:.9;color:#a06060;}
.diary-empty{text-align:center;padding:40px 20px;font-style:italic;color:var(--text-dim);font-size:14px;line-height:1.8;opacity:.6;}
</style>
</head>
<body>

<script>
const SKEY='stoic-v3';
const DKEY='stoic-diary-v1';

const QUOTES=[
  {t:'Всё чужое, Луцилий — только время наше.',a:'Сенека',p:'seneca'},
  {t:'Уйди в себя насколько можешь — нет лучшего убежища, чем собственная душа.',a:'Сенека',p:'seneca'},
  {t:'Пока мы откладываем — жизнь проходит.',a:'Сенека',p:'seneca'},
  {t:'Кто везде — тот нигде.',a:'Сенека',p:'seneca'},
  {t:'Желание стать лучше — уже половина добродетели.',a:'Сенека',p:'seneca'},
  {t:'Нет попутного ветра для того, кто не знает в какую гавань плывёт.',a:'Сенека',p:'seneca'},
  {t:'Важно не сколько книг, а каких.',a:'Сенека',p:'seneca'},
  {t:'Счастлив тот, кто умеет признавать своё несчастье.',a:'Сенека',p:'seneca'},
  {t:'Живи с людьми так, будто Бог смотрит на тебя.',a:'Сенека',p:'seneca'},
  {t:'Vivere militare est. Жить — значит бороться.',a:'Сенека',p:'seneca'},
  {t:'Не требуй чтобы происходящее происходило так, как ты хочешь. Желай того, что есть.',a:'Эпиктет',p:'epictetus'},
  {t:'Людей тревожат не события, а мнения о событиях.',a:'Эпиктет',p:'epictetus'},
  {t:'Ты — не тело твоё и не имущество твоё, а воля твоя.',a:'Эпиктет',p:'epictetus'},
  {t:'Если хочешь освободиться — не желай ничего что не в твоей власти.',a:'Эпиктет',p:'epictetus'},
  {t:'Никто не может причинить тебе вред без твоего согласия.',a:'Эпиктет',p:'epictetus'},
  {t:'Сначала скажи себе кем хочешь быть. Потом делай то что необходимо.',a:'Эпиктет',p:'epictetus'},
  {t:'Не говори о том что сделаешь. Сначала сделай.',a:'Эпиктет',p:'epictetus'},
  {t:'Богатство — не в обладании многим, а в малых потребностях.',a:'Эпиктет',p:'epictetus'},
  {t:'Молчи больше чем говоришь. Говори только когда нужно.',a:'Эпиктет',p:'epictetus'},
  {t:'Того кто всё переносит — нельзя победить.',a:'Эпиктет',p:'epictetus'},
  {t:'Потеря есть не что иное как изменение, а изменение — радость природы.',a:'Марк Аврелий',p:'marcus'},
  {t:'Внутри тебя есть источник, который будет бить всегда, если ты будешь копать.',a:'Марк Аврелий',p:'marcus'},
  {t:'Делай меньше — но делай это лучше.',a:'Марк Аврелий',p:'marcus'},
  {t:'Препятствие на пути становится путём.',a:'Марк Аврелий',p:'marcus'},
  {t:'Скоро ты забудешь всё. Скоро всё забудет тебя.',a:'Марк Аврелий',p:'marcus'},
  {t:'Когда встаёшь утром с трудом — напомни себе: я встаю чтобы делать дело человека.',a:'Марк Аврелий',p:'marcus'},
  {t:'Всё что ты слышишь — мнение, не факт. Всё что видишь — перспектива, не правда.',a:'Марк Аврелий',p:'marcus'},
  {t:'Где можно жить — там можно жить хорошо.',a:'Марк Аврелий',p:'marcus'},
  {t:'Ты имеешь власть над своим умом, а не над внешними событиями.',a:'Марк Аврелий',p:'marcus'},
  {t:'Ограничь себя настоящим. Прошлое ушло. Будущее ещё не пришло.',a:'Марк Аврелий',p:'marcus'},
];

const SP=`Ты — Луций Анней Сенека, римский стоик, сенатор, бывший воспитатель Нерона. Отвечаешь ученику на русском языке.
КРИТИЧЕСКИ ВАЖНО: Каждое слово в твоём ответе должно быть написано ТОЛЬКО кириллицей. Перед отправкой проверь каждое слово — в нём не должно быть ни одного иероглифа, латинской, греческой или любой другой нерусской буквы. Если видишь такой символ — замени всё слово на русское.
ХАРАКТЕР: Образованный аристократ, пишешь красиво с метафорами. Признаёшь свои слабости. Цитируешь Эпикура. Сочувствуешь но подталкиваешь к росту. Темы: время, смерть, страсти, дружба, богатство как испытание. Стиль литературный тёплый меланхоличный. Цитаты в <em>...</em>. В конце вопрос или афоризм. 3-4 абзаца. Не упоминай ИИ.`;
const EP=`Ты — Эпиктет, греческий стоик, бывший раб, основатель школы в Никополе. Отвечаешь на русском.
КРИТИЧЕСКИ ВАЖНО: Каждое слово в твоём ответе должно быть написано ТОЛЬКО кириллицей. Перед отправкой проверь каждое слово — в нём не должно быть ни одного иероглифа, латинской, греческой или любой другой нерусской буквы. Если видишь такой символ — замени всё слово на русское.
ХАРАКТЕР: Жёсткий прямой без лишних слов. Главное: что в нашей власти vs не в нашей. Говоришь с позиции опыта рабства. Не сочувствуешь нытью. Темы: свобода воли, дисциплина желаний, долг. Стиль резкий сократовский. Цитаты в <em>...</em>. В конце провокационный вопрос. 3-4 абзаца. Не упоминай ИИ.`;
const MP=`Ты — Марк Аврелий, римский император и философ-стоик, автор «Размышлений». Отвечаешь на русском.
КРИТИЧЕСКИ ВАЖНО: Каждое слово в твоём ответе должно быть написано ТОЛЬКО кириллицей. Перед отправкой проверь каждое слово — в нём не должно быть ни одного иероглифа, латинской, греческой или любой другой нерусской буквы. Если видишь такой символ — замени всё слово на русское.
ХАРАКТЕР: Меланхоличный, глубоко честный с собой. Пишешь как в личном дневнике. Осознаёшь тщетность власти. Борешься с собственными слабостями. Темы: мимолётность времени, долг, смерть, внутренняя цитадель. Цитаты в <em>...</em>. В конце тихое напутствие. 3-4 абзаца. Не упоминай ИИ.`;
const ALL_P=`Ты отвечаешь от имени трёх философов-стоиков одновременно.
КРИТИЧЕСКИ ВАЖНО: Каждое слово в твоём ответе должно быть написано ТОЛЬКО кириллицей. Перед отправкой проверь каждое слово — в нём не должно быть ни одного иероглифа, латинской, греческой или любой другой нерусской буквы. Если видишь такой символ — замени всё слово на русское.
ФОРМАТ — строго JSON без обёртки:
{"seneca":"текст (абзацы через \\n\\n, цитаты в <em>...</em>)","epictetus":"текст (абзацы через \\n\\n, цитаты в <em>...</em>)","marcus":"текст (абзацы через \\n\\n, цитаты в <em>...</em>)"}
СЕНЕКА: аристократ, тёплый, литературный. 2-3 абзаца.
ЭПИКТЕТ: бывший раб, жёсткий, прямой. 2-3 абзаца.
МАРК АВРЕЛИЙ: император, меланхоличный дневник. 2-3 абзаца.
Только JSON. Не упоминать ИИ.`;

const INIT={seneca:'Приветствую тебя, ученик. Дай мне первое наставление дня.',epictetus:'Учитель, я пришёл к тебе. С чего начать?',marcus:'Приветствую тебя. Поделись первой мыслью дня.',all:'Приветствую вас, наставники. Дайте мне наставление дня.'};
const META={seneca:{name:'СЕНЕКА',role:'Сенатор · Философ',cls:'sen'},epictetus:{name:'ЭПИКТЕТ',role:'Вольноотпущенник · Учитель',cls:'epi'},marcus:{name:'МАРК АВРЕЛИЙ',role:'Император · Мудрец',cls:'mar'},all:{name:'АГОРА',role:'Диалог с тремя наставниками',cls:'agh'}};
const PHIL_NAMES={seneca:'Сенека',epictetus:'Эпиктет',marcus:'М. Аврелий',own:'Своя мысль'};

let state={histories:{seneca:[],epictetus:[],marcus:[],all:[]},messages:{seneca:[],epictetus:[],marcus:[],all:[]},firstMsg:{seneca:true,epictetus:true,marcus:true,all:true}};
let diary=[];
let currentChat=null,busy=false,currentTag='own',currentFilter='all';

const msgsEl=document.getElementById('msgs'),tSen=document.getElementById('tSen'),tEpi=document.getElementById('tEpi'),tMar=document.getElementById('tMar'),inp=document.getElementById('inp'),sendBtn=document.getElementById('sendBtn');

function saveState(){try{localStorage.setItem(SKEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(SKEY);if(r)state=JSON.parse(r);}catch(e){}}
function saveDiary(){try{localStorage.setItem(DKEY,JSON.stringify(diary));}catch(e){}}
function loadDiary(){try{const r=localStorage.getItem(DKEY);if(r)diary=JSON.parse(r);}catch(e){}}
function getApiKey(){return localStorage.getItem('stoic-api-key')||'';}

function saveKey(){
  const k=document.getElementById('keyInput').value.trim();
  if(!k.startsWith('gsk_')){alert('Ключ Groq должен начинаться с gsk_...');return;}
  localStorage.setItem('stoic-api-key',k);
  document.getElementById('keyScreen').classList.add('hidden');
  showHome();
}

function showDailyQuote(){
  const day=Math.floor(Date.now()/86400000);
  const qSen=QUOTES.filter(q=>q.p==='seneca');
  const qEpi=QUOTES.filter(q=>q.p==='epictetus');
  const qMar=QUOTES.filter(q=>q.p==='marcus');
  document.getElementById('quoteText-seneca').textContent=qSen[day%qSen.length].t;
  document.getElementById('quoteText-epictetus').textContent=qEpi[day%qEpi.length].t;
  document.getElementById('quoteText-marcus').textContent=qMar[day%qMar.length].t;
}

function showHome(){
  document.getElementById('homeScreen').classList.remove('hidden');
  document.getElementById('chatScreen').classList.add('hidden');
  document.getElementById('diaryScreen').classList.add('hidden');
  document.getElementById('scrollScreen').classList.add('hidden');
  currentChat=null;
  showDailyQuote();
}
function goHome(){showHome();}

function openChat(phil){
  currentChat=phil;
  const m=META[phil];
  const hdr=document.getElementById('chatHeader');
  hdr.className='chat-header '+m.cls;
  document.getElementById('chatName').textContent=m.name;
  document.getElementById('chatRole').textContent=m.role;
  document.querySelectorAll('.msg').forEach(el=>el.remove());
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  const saved=state.messages[phil]||[];
  if(saved.length>0){saved.forEach(msg=>renderMsg(msg,true));scrollDown();}
  else{setTimeout(()=>doSend('__init__'),400);}
  inp.focus();
}

// ── DIARY ──
function openDiary(){
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('diaryScreen').classList.remove('hidden');
  renderEntries();
}

function setTag(t){
  currentTag=t;
  ['seneca','epictetus','marcus','own'].forEach(x=>{
    const el=document.getElementById('tag-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
}

function setFilter(f){
  currentFilter=f;
  ['all','seneca','epictetus','marcus','own'].forEach(x=>{
    const el=document.getElementById('f-'+x);
    if(el)el.classList.toggle('active',x===f);
  });
  renderEntries();
}

function saveEntry(){
  const text=document.getElementById('diaryInput').value.trim();
  if(!text)return;
  const now=new Date();
  const dateStr=now.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  diary.unshift({id:Date.now(),phil:currentTag,text,date:dateStr});
  saveDiary();
  document.getElementById('diaryInput').value='';
  renderEntries();
}

function deleteEntry(id){
  if(!confirm('Удалить эту запись?'))return;
  diary=diary.filter(e=>e.id!==id);
  saveDiary();
  renderEntries();
}

function renderEntries(){
  const list=document.getElementById('entriesList');
  const filtered=currentFilter==='all'?diary:diary.filter(e=>e.phil===currentFilter);
  if(filtered.length===0){
    list.innerHTML=`<div class="diary-empty">Здесь будут твои записи.<br>Начни первую после беседы с наставником.</div>`;
    return;
  }
  list.innerHTML=filtered.map(e=>`
    <div class="entry-card ${e.phil}" style="animation-delay:0s">
      <div class="entry-meta">
        <span class="entry-dot"></span>
        <span class="entry-phil">${PHIL_NAMES[e.phil]||e.phil}</span>
        <button class="entry-del" onclick="deleteEntry(${e.id})">✕</button>
        <span class="entry-date">${e.date}</span>
      </div>
      <div class="entry-text">${e.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
}

// ── CHAT ──
function scrollDown(){msgsEl.scrollTop=msgsEl.scrollHeight;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>');}
function fmt(s){return esc(s).split(/\n\n+/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}

function renderMsg(m,skipSave){
  const w=document.createElement('div');
  w.className=`msg ${m.role}`;
  const labels={seneca:'СЕНЕКА',epictetus:'ЭПИКТЕТ',marcus:'М. АВРЕЛИЙ',user:'ТЫ'};
  const label=labels[m.role]||'';
  const dir=m.role==='user'?'row-reverse':'';
  const badge=m.badge?`<div class="badge">✦ Наставление дня</div>`:'';
  const body=m.role==='user'?`<p>${esc(m.text)}</p>`:m.html;
  w.innerHTML=`<div class="msg-label" style="flex-direction:${dir}"><span class="gem"></span><span>${label}</span></div><div class="bubble">${badge}${body}</div>`;
  msgsEl.insertBefore(w,tSen);
  if(!skipSave&&currentChat){state.messages[currentChat].push(m);saveState();}
  scrollDown();
}

async function callAPI(sys,hist,txt){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getApiKey()},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,messages:[{role:'system',content:sys},...hist,{role:'user',content:txt}]})});
  const d=await res.json();
  return d.choices?.[0]?.message?.content||'';
}

async function doSend(text){
  const raw=text||inp.value.trim();
  if(!raw||busy||!currentChat)return;
  busy=true;sendBtn.disabled=true;
  inp.value='';inp.style.height='auto';
  const isInit=raw==='__init__';
  const userText=isInit?INIT[currentChat]:raw;
  const phil=currentChat;
  const isFirst=state.firstMsg[phil];
  if(!isInit)renderMsg({role:'user',text:raw});
  try{
    if(phil==='seneca'){
      tSen.classList.add('show');scrollDown();
      const r=await callAPI(SP,state.histories.seneca,userText);
      tSen.classList.remove('show');
      state.histories.seneca.push({role:'user',content:userText},{role:'assistant',content:r});
      renderMsg({role:'seneca',html:fmt(r),badge:isFirst});
      state.firstMsg.seneca=false;
    }else if(phil==='epictetus'){
      tEpi.classList.add('show');scrollDown();
      const r=await callAPI(EP,state.histories.epictetus,userText);
      tEpi.classList.remove('show');
      state.histories.epictetus.push({role:'user',content:userText},{role:'assistant',content:r});
      renderMsg({role:'epictetus',html:fmt(r),badge:isFirst});
      state.firstMsg.epictetus=false;
    }else if(phil==='marcus'){
      tMar.classList.add('show');scrollDown();
      const r=await callAPI(MP,state.histories.marcus,userText);
      tMar.classList.remove('show');
      state.histories.marcus.push({role:'user',content:userText},{role:'assistant',content:r});
      renderMsg({role:'marcus',html:fmt(r),badge:isFirst});
      state.firstMsg.marcus=false;
    }else{
      tSen.classList.add('show');tEpi.classList.add('show');tMar.classList.add('show');scrollDown();
      const raw2=await callAPI(ALL_P,state.histories.all,userText);
      tSen.classList.remove('show');tEpi.classList.remove('show');tMar.classList.remove('show');
      state.histories.all.push({role:'user',content:userText},{role:'assistant',content:raw2});
      let st='',et='',mt='';
      try{const p=JSON.parse(raw2.replace(/```json|```/g,'').trim());st=p.seneca||'';et=p.epictetus||'';mt=p.marcus||'';}catch{st=raw2;}
      if(st)renderMsg({role:'seneca',html:fmt(st),badge:isFirst});
      if(et)renderMsg({role:'epictetus',html:fmt(et),badge:false});
      if(mt)renderMsg({role:'marcus',html:fmt(mt),badge:false});
      state.firstMsg.all=false;
    }
    saveState();
  }catch(e){
    tSen.classList.remove('show');tEpi.classList.remove('show');tMar.classList.remove('show');
    renderMsg({role:'seneca',html:'<p>Прости, слова не приходят. Попробуй снова.</p>',badge:false});
  }
  busy=false;sendBtn.disabled=false;inp.focus();
}

function doClear(){
  if(!confirm('Очистить историю этого чата?'))return;
  state.histories[currentChat]=[];state.messages[currentChat]=[];state.firstMsg[currentChat]=true;
  saveState();
  document.querySelectorAll('.msg').forEach(el=>el.remove());
  setTimeout(()=>doSend('__init__'),200);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px';});
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}


// ── SCROLL ──
const SCKEY='stoic-scroll-v1';
let scroll_items=[];
let scrollFilter='all';

function loadScroll(){try{const r=localStorage.getItem(SCKEY);if(r)scroll_items=JSON.parse(r);}catch(e){}}
function saveScroll(){try{localStorage.setItem(SCKEY,JSON.stringify(scroll_items));}catch(e){}}

function saveToScroll(btn,phil){
  const bubble=btn.closest('.bubble');
  const paras=bubble.querySelectorAll('p');
  let text='';
  paras.forEach(p=>{text+=p.innerText+'\n\n';});
  text=text.trim();
  if(!text)return;
  const now=new Date();
  const dateStr=now.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  scroll_items.unshift({id:Date.now(),phil,text,date:dateStr});
  saveScroll();
  btn.textContent='✓ Сохранено';
  btn.classList.add('saved');
  btn.disabled=true;
}

function openScroll(){
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('scrollScreen').classList.remove('hidden');
  renderScroll();
}

function setScrollFilter(f){
  scrollFilter=f;
  ['all','seneca','epictetus','marcus'].forEach(x=>{
    const el=document.getElementById('sf-'+x);
    if(el)el.classList.toggle('active',x===f);
  });
  renderScroll();
}

function deleteScroll(id){
  if(!confirm('Удалить эту цитату?'))return;
  scroll_items=scroll_items.filter(e=>e.id!==id);
  saveScroll();
  renderScroll();
}

function renderScroll(){
  const list=document.getElementById('scrollList');
  const filtered=scrollFilter==='all'?scroll_items:scroll_items.filter(e=>e.phil===scrollFilter);
  if(filtered.length===0){
    list.innerHTML='<div class="scroll-empty">Свиток пуст.<br>Сохраняй понравившиеся ответы<br>кнопкой ✦ В свиток в чате.</div>';
    return;
  }
  const names={seneca:'Сенека',epictetus:'Эпиктет',marcus:'М. Аврелий'};
  list.innerHTML=filtered.map(e=>`
    <div class="scroll-card ${e.phil}">
      <div class="scroll-meta">
        <span class="scroll-dot"></span>
        <span class="scroll-phil">${names[e.phil]||e.phil}</span>
        <button class="scroll-del" onclick="deleteScroll(${e.id})">✕</button>
        <span class="scroll-date">${e.date}</span>
      </div>
      <div class="scroll-text">${e.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
}

loadState();
loadDiary();
loadScroll();
if(!getApiKey()){document.getElementById('keyScreen').classList.remove('hidden');}
else{showHome();}
</script>
</body>
