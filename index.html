<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Стоики">
<meta name="theme-color" content="#090806">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Сенека и Эпиктет</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090806;
  --gold: #c8a84b;
  --gold-light: #e8c96a;
  --gold-dim: #6a5528;
  --silver: #9aabb8;
  --silver-light: #c4d4e0;
  --silver-dim: #4a5a66;
  --text: #e4d8be;
  --text-dim: #7a6e58;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

body {
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200,168,75,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 80% 70%, rgba(100,143,168,.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  animation: breathe 8s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:1;} 50%{opacity:.7;} }

/* API KEY SCREEN */
#keyScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  gap: 20px;
}
#keyScreen.hidden { display: none; }

.key-title {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(200,168,75,.4);
  text-align: center;
}
.key-subtitle {
  font-style: italic;
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.7;
  max-width: 300px;
}
.key-divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
}
.key-input {
  width: 100%;
  max-width: 340px;
  background: rgba(22,18,10,.88);
  border: 1px solid rgba(200,168,75,.25);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 12px 14px;
  outline: none;
  letter-spacing: 0.5px;
  text-align: center;
  -webkit-appearance: none;
}
.key-input:focus { border-color: rgba(200,168,75,.5); }
.key-input::placeholder { color: rgba(120,110,80,.4); font-style: italic; font-size: 12px; }
.key-btn {
  width: 100%;
  max-width: 340px;
  background: linear-gradient(135deg, rgba(200,168,75,.15), rgba(200,168,75,.08));
  border: 1px solid rgba(200,168,75,.35);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  padding: 14px;
  cursor: pointer;
  text-transform: uppercase;
  -webkit-appearance: none;
  transition: all .2s;
}
.key-btn:active { background: rgba(200,168,75,.25); }
.key-note {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  opacity: .6;
  line-height: 1.6;
  max-width: 300px;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid rgba(200,168,75,.15);
  background: rgba(9,8,6,.98);
  flex-shrink: 0;
  padding-top: var(--safe-top);
}

.phil-col {
  flex: 1;
  text-align: center;
  padding: 14px 8px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.phil-col.seneca { border-right: 1px solid rgba(200,168,75,.12); }

.era {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.seneca .era { color: var(--gold-dim); }
.epictetus .era { color: var(--silver-dim); }

.phil-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: clamp(13px, 4vw, 20px);
  letter-spacing: 3px;
}
.seneca .phil-name { color: var(--gold); text-shadow: 0 0 20px rgba(200,168,75,.4); }
.epictetus .phil-name { color: var(--silver); text-shadow: 0 0 20px rgba(154,171,184,.35); }

.phil-role {
  font-style: italic;
  font-size: 9px;
  opacity: .6;
}
.seneca .phil-role { color: var(--gold); }
.epictetus .phil-role { color: var(--silver); }

.hdr-mid {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  flex-shrink: 0;
  border-left: 1px solid rgba(200,168,75,.1);
  border-right: 1px solid rgba(200,168,75,.1);
}
.et {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  color: var(--text-dim);
  writing-mode: vertical-lr;
  opacity: .55;
  letter-spacing: 1px;
}

/* MESSAGES */
#msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  z-index: 10;
  -webkit-overflow-scrolling: touch;
}
#msgs::-webkit-scrollbar { width: 2px; }
#msgs::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

.msg {
  max-width: 88%;
  animation: slideIn .4s cubic-bezier(.22,.68,0,1.2) forwards;
  opacity: 0;
}
.msg.seneca, .msg.epictetus { align-self: flex-start; }
.msg.user { align-self: flex-end; }

@keyframes slideIn {
  from { opacity:0; transform: translateY(14px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.msg-label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.msg.user .msg-label { flex-direction: row-reverse; color: var(--text-dim); }
.msg.seneca .msg-label { color: var(--gold-dim); }
.msg.epictetus .msg-label { color: var(--silver-dim); }

.gem {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block;
}
.msg.seneca .gem    { background: var(--gold);    box-shadow: 0 0 7px rgba(200,168,75,.7); }
.msg.epictetus .gem { background: var(--silver);  box-shadow: 0 0 7px rgba(154,171,184,.6); }
.msg.user .gem      { background: var(--text-dim); }

.bubble {
  padding: 12px 16px;
  font-size: clamp(13.5px, 3.5vw, 15.5px);
  line-height: 1.8;
}
.bubble p { margin-bottom: .5em; }
.bubble p:last-child { margin-bottom: 0; }
.bubble em { font-style: italic; }

.msg.seneca .bubble {
  background: rgba(40,32,14,.92);
  border-left: 2px solid var(--gold);
  border-top: 1px solid rgba(200,168,75,.18);
  color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.msg.seneca .bubble em { color: var(--gold-light); }

.msg.epictetus .bubble {
  background: rgba(14,24,34,.92);
  border-left: 2px solid #6a8fa8;
  border-top: 1px solid rgba(106,143,168,.18);
  color: #d8e8f0;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.msg.epictetus .bubble em { color: var(--silver-light); }

.msg.user .bubble {
  background: rgba(15,13,10,.75);
  border-right: 2px solid rgba(100,90,65,.3);
  border-top: 1px solid rgba(100,90,65,.12);
  color: var(--text-dim);
  font-style: italic;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 8px;
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 8px 2px 6px;
  border: 1px solid;
}
.msg.seneca .badge    { color: var(--gold);   border-color: var(--gold-dim);   background: rgba(200,168,75,.05); }
.msg.epictetus .badge { color: var(--silver); border-color: var(--silver-dim); background: rgba(154,171,184,.05); }

/* TYPING */
.typing {
  display: none;
  align-self: flex-start;
  padding: 9px 13px;
  border-left: 2px solid;
  gap: 5px;
  align-items: center;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
}
.typing.seneca-t  { border-color: var(--gold-dim);   background: rgba(40,32,14,.5);  color: var(--gold-dim); }
.typing.epictetus-t { border-color: var(--silver-dim); background: rgba(14,24,34,.5);  color: var(--silver-dim); }
.typing.show { display: flex; }

.td {
  width: 5px; height: 5px; border-radius: 50%;
  animation: tp 1.2s ease-in-out infinite;
}
.seneca-t .td    { background: var(--gold-dim); }
.epictetus-t .td { background: var(--silver-dim); }
.td:nth-child(2){animation-delay:.2s;} .td:nth-child(3){animation-delay:.4s;}
@keyframes tp { 0%,100%{opacity:.3;transform:scale(.75);} 50%{opacity:1;transform:scale(1);} }

/* FOOTER */
footer {
  position: relative;
  z-index: 10;
  background: rgba(7,6,4,.97);
  border-top: 1px solid rgba(200,168,75,.12);
  flex-shrink: 0;
  padding-bottom: var(--safe-bottom);
}

.mode-row {
  display: flex;
  gap: 6px;
  padding: 10px 12px 8px;
}

.mbtn {
  flex: 1;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 7px 4px;
  cursor: pointer;
  border: 1px solid;
  background: transparent;
  transition: all .2s;
  -webkit-appearance: none;
}
.mbtn.sen { border-color: var(--gold-dim); color: var(--gold-dim); }
.mbtn.sen.active, .mbtn.sen:active { border-color: var(--gold); color: var(--gold); background: rgba(200,168,75,.1); }
.mbtn.epi { border-color: var(--silver-dim); color: var(--silver-dim); }
.mbtn.epi.active, .mbtn.epi:active { border-color: var(--silver); color: var(--silver); background: rgba(154,171,184,.08); }
.mbtn.both { border-color: rgba(150,130,80,.3); color: rgba(180,155,90,.5); }
.mbtn.both.active, .mbtn.both:active { border-color: rgba(200,175,100,.6); color: rgba(230,200,120,.9); background: rgba(180,155,90,.07); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  padding: 0 12px 10px;
}

textarea {
  flex: 1;
  background: rgba(22,18,10,.88);
  border: 1px solid rgba(200,168,75,.18);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  padding: 9px 12px;
  resize: none;
  min-height: 44px;
  max-height: 110px;
  outline: none;
  transition: border-color .25s;
  line-height: 1.5;
  border-radius: 0;
  -webkit-appearance: none;
}
textarea::placeholder { color: rgba(120,110,80,.4); font-style: italic; }
textarea:focus { border-color: rgba(200,168,75,.4); }

#sendBtn {
  background: transparent;
  border: 1px solid rgba(200,168,75,.28);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  padding: 0 14px;
  cursor: pointer;
  text-transform: uppercase;
  height: 44px;
  white-space: nowrap;
  -webkit-appearance: none;
  transition: all .2s;
}
#sendBtn:active { background: rgba(200,168,75,.12); border-color: var(--gold); }
#sendBtn:disabled { opacity: .35; }

.bottom-row {
  display: flex;
  justify-content: center;
  padding: 0 12px 8px;
}
#clearBtn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  opacity: .4;
  padding: 4px 8px;
}
#clearBtn:active { opacity: .9; color: #a06060; }
</style>
</head>
<body>

<div id="keyScreen" class="hidden">
  <div class="key-title">СТОИКИ</div>
  <div class="key-divider"></div>
  <div class="key-subtitle">Для работы приложения введи API ключ от Anthropic. Он сохранится только на твоём телефоне.</div>
  <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="key-btn" onclick="saveKey()">Сохранить и войти</button>
  <div class="key-note">Ключ хранится локально в браузере и нигде не передаётся кроме серверов Anthropic</div>
</div>

<header>
  <div class="phil-col seneca">
    <div class="era">4 до н.э. — 65 н.э.</div>
    <div class="phil-name">СЕНЕКА</div>
    <div class="phil-role">Сенатор · Философ</div>
  </div>
  <div class="hdr-mid"><span class="et">ET</span></div>
  <div class="phil-col epictetus">
    <div class="era">50 — 135 н.э.</div>
    <div class="phil-name">ЭПИКТЕТ</div>
    <div class="phil-role">Вольноотпущенник · Учитель</div>
  </div>
</header>

<div id="msgs">
  <div class="typing seneca-t" id="tSen">
    СЕНЕКА <div class="td"></div><div class="td"></div><div class="td"></div>
  </div>
  <div class="typing epictetus-t" id="tEpi">
    ЭПИКТЕТ <div class="td"></div><div class="td"></div><div class="td"></div>
  </div>
</div>

<footer>
  <div class="mode-row">
    <button class="mbtn sen" id="bSen" onclick="setMode('seneca')">⬡ Сенека</button>
    <button class="mbtn both active" id="bBoth" onclick="setMode('both')">◈ Оба</button>
    <button class="mbtn epi" id="bEpi" onclick="setMode('epictetus')">⬡ Эпиктет</button>
  </div>
  <div class="input-row">
    <textarea id="inp" placeholder="Задай вопрос наставникам…" rows="1"></textarea>
    <button id="sendBtn" onclick="doSend()">Спросить</button>
  </div>
  <div class="bottom-row">
    <button id="clearBtn" onclick="doClear()">✕ Очистить историю</button>
  </div>
</footer>

<script>
const SKEY = 'stoic-pwa-v1';

const SP = `Ты — Луций Анней Сенека, римский стоик, сенатор, бывший воспитатель Нерона. Отвечаешь ученику на русском языке.

ТВОЙ ХАРАКТЕР:
- Образованный аристократ. Пишешь красиво, с метафорами, образно.
- Признаёшь, что сам не всегда следуешь своим советам — ты честен об этом.
- Любишь Эпикура, часто его цитируешь, хотя сам стоик.
- Сочувствуешь слабостям человека, но мягко подталкиваешь к росту.
- Главная тема: время, смерть, страсти, дружба, богатство как испытание.
- Стиль: литературный, тёплый, немного меланхоличный.
- Цитаты оборачивай в <em>...</em>.
- В конце — вопрос ученику ИЛИ афоризм-напутствие.
- 3–4 абзаца. Не больше.
- Ты НЕ упоминаешь, что ты ИИ.`;

const EP = `Ты — Эпиктет, греческий стоик, бывший раб, основатель школы в Никополе. Отвечаешь ученику на русском языке.

ТВОЙ ХАРАКТЕР:
- Жёсткий, прямой, без лишних слов. Не терпишь самооправданий.
- Главное разделение: что в нашей власти (воля, суждение) — и что НЕ в нашей власти (тело, репутация, имущество).
- Бедность и рабство пережил сам — говоришь с позиции опыта, а не теории.
- Не сочувствуешь нытью. Но справедлив и уважаешь искреннего ученика.
- Главные темы: свобода воли, дисциплина желаний, ролевые обязанности, смерть без страха.
- Стиль: короткий, резкий, сократовский — задаёшь вопросы в лоб.
- Цитаты оборачивай в <em>...</em>.
- В конце — провокационный вопрос ИЛИ жёсткое напутствие.
- 3–4 абзаца. Лаконично.
- Ты НЕ упоминаешь, что ты ИИ.`;

const BP = `Ты отвечаешь ОТ ИМЕНИ ДВУХ философов сразу.
ФОРМАТ — строго JSON без обёртки:
{"seneca":"текст Сенеки (абзацы через \\n\\n, цитаты в <em>...</em>)","epictetus":"текст Эпиктета (абзацы через \\n\\n, цитаты в <em>...</em>)"}
СЕНЕКА: аристократ, тёплый, литературный, признаёт слабости, темы — время/смерть/страсти/дружба. 3–4 абзаца.
ЭПИКТЕТ: бывший раб, жёсткий, прямой, что в нашей власти vs нет, сократовские вопросы. 3–4 абзаца.
Оба на один вопрос, но с разных позиций. НЕ упоминать ИИ. Только JSON.`;

let mode = 'both';
let hSen = [], hEpi = [], hBoth = [];
let savedMsgs = [];
let isFirst = true;
let busy = false;

const msgsEl = document.getElementById('msgs');
const tSen   = document.getElementById('tSen');
const tEpi   = document.getElementById('tEpi');
const inp    = document.getElementById('inp');
const sendBtn= document.getElementById('sendBtn');

// ── STORAGE ──
function save() {
  try {
    localStorage.setItem(SKEY, JSON.stringify({ hSen, hEpi, hBoth, savedMsgs, isFirst }));
  } catch(e) {}
}

function load() {
  try {
    const r = localStorage.getItem(SKEY);
    if (!r) return false;
    const s = JSON.parse(r);
    hSen = s.hSen || []; hEpi = s.hEpi || []; hBoth = s.hBoth || [];
    savedMsgs = s.savedMsgs || [];
    isFirst = s.isFirst !== undefined ? s.isFirst : true;
    return savedMsgs.length > 0;
  } catch(e) { return false; }
}

// ── RENDER ──
function scrollDown() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>');
}

function fmt(s) {
  return esc(s).split(/\n\n+/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

function renderMsg(m, skipSave) {
  const w = document.createElement('div');
  w.className = `msg ${m.role}`;
  const label = m.role === 'seneca' ? 'СЕНЕКА' : m.role === 'epictetus' ? 'ЭПИКТЕТ' : 'ТЫ';
  const labelDir = m.role === 'user' ? 'row-reverse' : '';
  const badgeHtml = m.badge ? `<div class="badge">✦ Наставление дня</div>` : '';
  const content = m.role === 'user' ? `<p>${esc(m.text)}</p>` : m.html;
  w.innerHTML = `
    <div class="msg-label" style="flex-direction:${labelDir}">
      <span class="gem"></span><span>${label}</span>
    </div>
    <div class="bubble">${badgeHtml}${content}</div>`;
  msgsEl.insertBefore(w, tSen);
  if (!skipSave) { savedMsgs.push(m); save(); }
  scrollDown();
}

// ── MODE ──
function setMode(m) {
  mode = m;
  document.getElementById('bSen').classList.toggle('active', m==='seneca');
  document.getElementById('bBoth').classList.toggle('active', m==='both');
  document.getElementById('bEpi').classList.toggle('active', m==='epictetus');
  inp.focus();
}

// ── API ──
async function callAPI(system, history, userText) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': getApiKey(), 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages: [...history, { role: 'user', content: userText }]
    })
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('') || '';
}

// ── SEND ──
async function doSend(text) {
  const raw = text || inp.value.trim();
  if (!raw || busy) return;
  busy = true;
  sendBtn.disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  const isInit = raw === '__init__';
  const userText = isInit ? 'Приветствую вас, наставники. Дайте мне первое наставление дня.' : raw;

  if (!isInit) renderMsg({ role:'user', text: raw });

  try {
    if (mode === 'seneca') {
      tSen.classList.add('show'); scrollDown();
      const reply = await callAPI(SP, hSen, userText);
      tSen.classList.remove('show');
      hSen.push({ role:'user', content:userText }, { role:'assistant', content:reply });
      renderMsg({ role:'seneca', html: fmt(reply), badge: isFirst });
      isFirst = false;

    } else if (mode === 'epictetus') {
      tEpi.classList.add('show'); scrollDown();
      const reply = await callAPI(EP, hEpi, userText);
      tEpi.classList.remove('show');
      hEpi.push({ role:'user', content:userText }, { role:'assistant', content:reply });
      renderMsg({ role:'epictetus', html: fmt(reply), badge: isFirst });
      isFirst = false;

    } else {
      tSen.classList.add('show'); tEpi.classList.add('show'); scrollDown();
      const raw2 = await callAPI(BP, hBoth, userText);
      tSen.classList.remove('show'); tEpi.classList.remove('show');
      hBoth.push({ role:'user', content:userText }, { role:'assistant', content:raw2 });
      let st='', et='';
      try {
        const p = JSON.parse(raw2.replace(/```json|```/g,'').trim());
        st = p.seneca||''; et = p.epictetus||'';
      } catch { st = raw2; }
      if (st) renderMsg({ role:'seneca',    html: fmt(st), badge: isFirst });
      if (et) renderMsg({ role:'epictetus', html: fmt(et), badge: false });
      isFirst = false;
    }
  } catch(e) {
    tSen.classList.remove('show'); tEpi.classList.remove('show');
    renderMsg({ role:'seneca', html:'<p>Прости, слова не приходят. Попробуй снова.</p>', badge:false });
  }

  busy = false;
  sendBtn.disabled = false;
  inp.focus();
}

// ── CLEAR ──
function doClear() {
  if (!confirm('Очистить всю историю?')) return;
  localStorage.removeItem(SKEY);
  hSen=[]; hEpi=[]; hBoth=[]; savedMsgs=[]; isFirst=true;
  document.querySelectorAll('.msg').forEach(el=>el.remove());
  setTimeout(()=>doSend('__init__'), 200);
}

// ── INPUT ──
inp.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
inp.addEventListener('input', () => {
  inp.style.height='auto';
  inp.style.height = Math.min(inp.scrollHeight, 110)+'px';
});

// Prevent zoom on double-tap iOS
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

// ── API KEY ──
function getApiKey() {
  return localStorage.getItem('stoic-api-key') || '';
}

function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('sk-ant-')) {
    alert('Ключ должен начинаться с sk-ant-...');
    return;
  }
  localStorage.setItem('stoic-api-key', k);
  document.getElementById('keyScreen').classList.add('hidden');
  setTimeout(() => doSend('__init__'), 300);
}

// ── INIT ──
// ── INIT ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

if (!getApiKey()) {
  document.getElementById('keyScreen').classList.remove('hidden');
} else {
  const had = load();
  if (had) {
    savedMsgs.forEach(m => renderMsg(m, true));
    scrollDown();
  } else {
    setTimeout(() => doSend('__init__'), 500);
  }
}
</script>
</body>
</html>
